<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ticketing.Front</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Ticketing.Front.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <!-- Firebase SDK y módulo de autenticación -->
    <script type="module">
        // Cargar configuración de Firebase desde appsettings.json (sin caché)
        // IMPORTANTE: Esto DEBE completarse ANTES de importar firebase-auth.js
        async function loadFirebaseConfig() {
            try {
                const response = await fetch('appsettings.json?t=' + Date.now());
                const config = await response.json();
                window.firebaseConfig = config.firebase;
                console.log('✓ Firebase config cargada correctamente:', config.firebase);
                
                // SOLO DESPUÉS de que la config esté lista, importar el módulo
                import('./firebase-auth.js').catch(error => {
                    console.error('✗ Error cargando firebase-auth.js:', error);
                });
            } catch (error) {
                console.error('✗ Error al cargar configuración:', error);
            }
        }

        loadFirebaseConfig();
    </script>

    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
